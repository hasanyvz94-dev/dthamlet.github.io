<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HY maket Görüntüleyici</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<script src="aframe.min.js"></script>
<script src="aframe-ar.js"></script>

<script src="https://unpkg.com/aframe-gesture-detector/dist/aframe-gesture-detector.min.js"></script>
<script src="https://unpkg.com/aframe-gesture-handler/dist/aframe-gesture-handler.min.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs gesture-detector>

<a-marker type="pattern" url="marker.patt">

<a-entity
gltf-model="model.glb"
scale="0.5 0.5 0.5"
gesture-handler>
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
