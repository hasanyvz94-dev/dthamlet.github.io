<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HY Maket Görüntüleyici</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<script src="aframe.min.js"></script>
<script src="aframe-ar.js"></script>

<script>
AFRAME.registerComponent('touch-rotate-scale', {
  init: function () {
    const el = this.el;
    this.initialDistance = null;
    this.initialScale = el.object3D.scale.clone();
    this.prevRotation = 0;

    // Tek parmak sürükleme ile döndürme
    let isDragging = false;
    let lastX = 0;

    el.sceneEl.canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        const touchTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el.contains(touchTarget)) {
          isDragging = true;
          lastX = touch.clientX;
        }
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        this.initialDistance = Math.sqrt(dx*dx + dy*dy);
        this.initialScale = el.object3D.scale.clone();
      }
    });

    el.sceneEl.canvas.addEventListener('touchmove', e => {
      if (isDragging && e.touches.length === 1) {
        const touch = e.touches[0];
        const deltaX = touch.clientX - lastX;
        el.object3D.rotation.y += deltaX * 0.01; // döndürme hızı
        lastX = touch.clientX;
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const scaleFactor = dist / this.initialDistance;
        el.object3D.scale.set(
          this.initialScale.x * scaleFactor,
          this.initialScale.y * scaleFactor,
          this.initialScale.z * scaleFactor
        );
      }
    });

    el.sceneEl.canvas.addEventListener('touchend', e => {
      if (e.touches.length < 2) this.initialDistance = null;
      if (e.touches.length === 0) isDragging = false;
    });
  }
});
</script>

</head>
<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs
         renderer="logarithmicDepthBuffer: true;"
         vr-mode-ui="enabled: false"
         device-orientation-permission-ui="enabled: false">

  <a-marker type="pattern" url="marker.patt">
    <a-entity
      gltf-model="model.glb"
      scale="0.5 0.5 0.5"
      rotation="0 0 0"
      touch-rotate-scale>
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

</body>
</html>
